<!doctype html>
<html>
  <head>
    <title>Prince Loves You</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <body>
    <div class="heart" style="left: 10%; animation-duration: 6s"></div>
    <div class="heart" style="left: 30%; animation-duration: 8s"></div>
    <div class="heart" style="left: 50%; animation-duration: 7s"></div>
    <div class="heart" style="left: 70%; animation-duration: 9s"></div>
    <div class="heart" style="left: 90%; animation-duration: 5s"></div>

    <h2>Prince has a message for you!</h2>
    <button class="open-btn" id="openModal">
      <img src="assets/love-message.png" />
    </button>

    <div class="overlay" id="overlay">
      <div class="modal">
        <h2 contenteditable="true" spellcheck="false" id="modalTitle">Love ♡</h2>
        <img id="princeImage" src="assets/prince-image.jpg" />
        <input type="file" id="imageUpload" accept="image/*" hidden />
        <label for="imageUpload" class="upload-btn">Choose Your Image</label>
        <button class="share-btn">Share</button>
        <button class="close-btn" id="closeModal">Close</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
